# Drop this file into /etc/nginx/sites-available/kurdish-dictionary.conf
# then: sudo ln -s /etc/nginx/sites-available/kurdish-dictionary.conf /etc/nginx/sites-enabled/
# then: sudo nginx -t && sudo systemctl reload nginx

# ── managedictionary.siratechnology.com → Blazor (port 6001) ────────────────
server {
    listen 80;
    server_name managedictionary.siratechnology.com;

    location / {
        proxy_pass         http://localhost:6001;
        proxy_http_version 1.1;

        # Required for Blazor Server SignalR / WebSockets
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ── dictionary.siratechnology.com → Next.js (port 4000) ─────────────────────
server {
    listen 80;
    server_name dictionary.siratechnology.com;

    location / {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
