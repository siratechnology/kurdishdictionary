events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Shared proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── managedictionary.siratechnology.com → Blazor ────────────────────
    server {
        listen 80;
        server_name managedictionary.siratechnology.com;

        location / {
            proxy_pass http://frontend-blazor:8080;

            # WebSocket support required for Blazor Server SignalR
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }
    }

    # ── dictionary.siratechnology.com → Next.js ──────────────────────────
    server {
        listen 80;
        server_name dictionary.siratechnology.com;

        location / {
            proxy_pass http://frontend-nextjs:4000;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
