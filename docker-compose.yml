services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: kurdish-sqlserver
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - kurdish-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C -N || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kurdish-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=KurdishDictionary;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;"
    ports:
      - "6000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - kurdish-net
    restart: unless-stopped

  frontend-blazor:
    build:
      context: .
      dockerfile: frontend-blazor/Dockerfile
    container_name: kurdish-blazor
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "6001:8080"
    depends_on:
      - backend
    networks:
      - kurdish-net
    restart: unless-stopped

  frontend-nextjs:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
    container_name: kurdish-nextjs
    environment:
      NODE_ENV: production
      API_URL: http://backend:8080
    ports:
      - "4000:4000"
    depends_on:
      - backend
    networks:
      - kurdish-net
    restart: unless-stopped

volumes:
  sqlserver_data:
    driver: local

networks:
  kurdish-net:
    driver: bridge
