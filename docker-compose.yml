services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kurdish-backend
    environment:
        ASPNETCORE_ENVIRONMENT: Production
        ASPNETCORE_URLS: http://+:8080
        ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=KurdishDictionary;User Id=kurdish_user;Password=${SQL_USER_PASSWORD};TrustServerCertificate=True;"
        # Signs the login tokens. The app refuses to start in Production without it — a hardcoded
        # key would let anyone mint an admin token. Rotating it logs everyone out.
        Jwt__Key: ${JWT_KEY}
        Jwt__ExpiryDays: 7
        # First-run accounts. Change the passwords after the first login; the dashboard nags until you do.
        Seed__AdminUserName: ${SEED_ADMIN_USER:-sirwan}
        Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-sirwanjaff999@gmail.com}
        Seed__AdminPassword: ${SEED_ADMIN_PASSWORD:-Admin@123!}
        Seed__EditorPassword: ${SEED_EDITOR_PASSWORD:-Editor@123!}
    ports:
      - "6000:8080"
    networks:
      - kurdish-net
      - greenschool_default
    restart: unless-stopped

  frontend-blazor:
    build:
      context: .
      dockerfile: frontend-blazor/Dockerfile
    container_name: kurdish-blazor
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "6001:8080"
    depends_on:
      - backend
    networks:
      - kurdish-net
    restart: unless-stopped

  frontend-nextjs:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
    container_name: kurdish-nextjs
    environment:
      NODE_ENV: production
      API_URL: http://backend:8080
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:4000}
    ports:
      - "4000:4000"
    depends_on:
      - backend
    networks:
      - kurdish-net
    restart: unless-stopped

networks:
  kurdish-net:
    driver: bridge
  greenschool_default:
    external: true
